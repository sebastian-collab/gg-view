<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select View</title>

<style>
body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.container{
    text-align:center;
}

button{
    width:200px;
    padding:15px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Select Version</h2>

<!-- redirect to web page -->
<button onclick="goWeb()">Web View</button>

<!-- redirect to mobile page -->
<button onclick="goMobile()">Mobile View</button>

</div>

<script>

// redirect to web page
function goWeb(){
    window.location.href = "web.html";
}

// redirect to mobile page
function goMobile(){
    window.location.href = "mobile.html";
}

</script>

</body>
</html>
